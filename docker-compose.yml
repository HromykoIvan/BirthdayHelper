services:
  app:
    image: ${ACC_ID}.dkr.ecr.${REGION}.amazonaws.com/${ECR_REPO}:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    networks: [net]
    # Ждём readiness самого приложения
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on: [app]
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./ops/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [net]

volumes:
  caddy_data: {}
  caddy_config: {}

networks:
  net: {}

