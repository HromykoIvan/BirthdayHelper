name: Build & Push (ARM64) to ECR

on:
  push:
    branches: [ master ]
    paths:
      - "backend/**"
      - "Dockerfile"
      - ".github/workflows/build-and-push.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REPO: ${{ vars.ECR_REPO }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # AWS login by OIDC
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      # Ensure ECR repository exists
      - name: Ensure ECR repo exists
        run: |
          set -e
          aws ecr describe-repositories \
            --repository-names "${{ env.ECR_REPO }}" \
            --region "${{ env.AWS_REGION }}" >/dev/null 2>&1 || \
          aws ecr create-repository \
            --repository-name "${{ env.ECR_REPO }}" \
            --image-scanning-configuration scanOnPush=true \
            --region "${{ env.AWS_REGION }}"

      # buildx + qemu for linux/arm64
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push (linux/arm64)
        id: build
        run: |
          set -e
          echo "::group::🔨 Building Docker image"
          echo "[$(date -u +'%Y-%m-%d %H:%M:%S UTC')] Starting build process"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Ref: ${{ github.ref }}"
          
          REPO_URI="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}"
          echo "Repository URI: ${REPO_URI}"
          echo "Image tags: ${REPO_URI}:${{ env.IMAGE_TAG }}, ${REPO_URI}:latest"
          
          docker buildx build \
            --platform linux/arm64 \
            -f Dockerfile \
            -t "${REPO_URI}:${{ env.IMAGE_TAG }}" \
            -t "${REPO_URI}:latest" \
            --push \
            --progress=plain \
            .
          
          echo "[$(date -u +'%Y-%m-%d %H:%M:%S UTC')] Build and push completed successfully"
          echo "::endgroup::"
          
          echo "IMAGE_URI=${REPO_URI}:${{ env.IMAGE_TAG }}" >> $GITHUB_OUTPUT
          echo "IMAGE_URI_LATEST=${REPO_URI}:latest" >> $GITHUB_OUTPUT

      - name: Output image URI
        run: |
          echo "::group::📦 Image Information"
          echo "IMAGE_URI=${{ steps.build.outputs.IMAGE_URI }}"
          echo "IMAGE_URI_LATEST=${{ steps.build.outputs.IMAGE_URI_LATEST }}"
          echo "::endgroup::"

  rollout:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve bot instance ID (SSM param or tag)
        id: get-instance
        run: |
          set -e
          echo "::group::🔍 Resolving EC2 instance ID"
          echo "[$(date -u +'%Y-%m-%d %H:%M:%S UTC')] Looking for bot instance..."
          
          PARAM="/birthday-bot/bot-instance-id"
          if aws ssm get-parameter --name "$PARAM" --region "${{ env.AWS_REGION }}" >/dev/null 2>&1; then
            IID=$(aws ssm get-parameter --name "$PARAM" --region "${{ env.AWS_REGION }}" --query 'Parameter.Value' --output text)
            echo "✅ Found instance ID in SSM parameter: $IID"
          else
            echo "⚠️ SSM parameter not found, searching by tag..."
            IID=$(aws ec2 describe-instances \
              --region "${{ env.AWS_REGION }}" \
              --filters "Name=tag:Name,Values=BirthdayBotStack/BotInstance" "Name=instance-state-name,Values=running" \
              --query 'Reservations[0].Instances[0].InstanceId' --output text)
            
            if [ -z "$IID" ] || [ "$IID" = "None" ]; then
              echo "❌ ERROR: Could not find running instance with tag BirthdayBotStack/BotInstance"
              exit 1
            fi
            echo "✅ Found instance ID by tag: $IID"
          fi
          
          echo "Instance ID: $IID"
          echo "::endgroup::"
          echo "iid=$IID" >> $GITHUB_OUTPUT

      - name: Rollout container via SSM
        id: rollout
        run: |
          set -e
          echo "::group::🚀 Starting deployment rollout"
          echo "[$(date -u +'%Y-%m-%d %H:%M:%S UTC')] Preparing deployment..."
          
          IID='${{ steps.get-instance.outputs.iid }}'
          if [ -z "$IID" ] || [ "$IID" = "None" ]; then
            echo "❌ ERROR: No instance ID resolved"
            exit 1
          fi
          
          ECR="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}"
          IMG="${ECR}:latest"
          IMG_TAGGED="${ECR}:${{ env.IMAGE_TAG }}"
          
          echo "Instance ID: $IID"
          echo "Image (latest): $IMG"
          echo "Image (tagged): $IMG_TAGGED"
          echo "Region: ${{ env.AWS_REGION }}"
          echo "::endgroup::"
          
          echo "::group::📤 Sending SSM deployment command"
          cat > /tmp/rollout_commands.txt <<EOF
          set -e
          echo "Starting deployment rollout..."
          echo "Image: ${IMG_TAGGED}"
          echo "Commit: ${{ github.sha }}"
          mkdir -p /opt/birthday
          cd /opt/birthday
          echo "Logging into ECR..."
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${ECR}
          if [ ! -f .compose.env ]; then
            echo "WARNING: .compose.env not found, creating from environment..."
            ACC_ID=\$(aws sts get-caller-identity --query Account --output text)
            echo "ACC_ID=\${ACC_ID}" > .compose.env
            echo "REGION=${{ env.AWS_REGION }}" >> .compose.env
            echo "ECR_REPO=${{ env.ECR_REPO }}" >> .compose.env
            DOMAIN_VAL=\$(grep DOMAIN /etc/environment 2>/dev/null | cut -d= -f2 || echo bday-bot.duckdns.org)
            echo "DOMAIN=\${DOMAIN_VAL}" >> .compose.env
            echo "ACME_EMAIL=admin@example.com" >> .compose.env
            echo "Created .compose.env"
          fi
          if [ ! -f docker-compose.yml ]; then
            echo "ERROR: docker-compose.yml not found in /opt/birthday"
            exit 1
          fi
          COMPOSE_FILE=docker-compose.yml
          if [ -f docker-compose.yml ] && [ -f docker-compose.yaml ]; then
            echo "Both docker-compose.yml and docker-compose.yaml found; using docker-compose.yml"
          elif [ -f docker-compose.yaml ]; then
            COMPOSE_FILE=docker-compose.yaml
          fi
          echo "Pulling image: ${IMG_TAGGED}..."
          docker pull ${IMG_TAGGED} || docker pull ${IMG}
          docker tag ${IMG_TAGGED} ${IMG} 2>/dev/null || true
          echo "Stopping old container..."
          docker compose -f \${COMPOSE_FILE} --env-file .compose.env down app || true
          echo "Starting new container..."
          docker compose -f \${COMPOSE_FILE} --env-file .compose.env up -d app
          echo "Cleaning up old images..."
          docker image prune -f || true
          sleep 3
          echo "Checking container status..."
          docker compose -f \${COMPOSE_FILE} --env-file .compose.env ps app
          CONTAINER_ID=\$(docker compose -f \${COMPOSE_FILE} --env-file .compose.env ps -q app 2>/dev/null || echo '')
          if [ -n "\$CONTAINER_ID" ]; then
            CONTAINER_STATUS=\$(docker inspect --format='{{.State.Status}}' \$CONTAINER_ID 2>/dev/null || echo unknown)
            if [ "\$CONTAINER_STATUS" != "running" ]; then
              echo "WARNING: Container status is not running: \$CONTAINER_STATUS"
              echo "Container logs:"
              docker compose -f \${COMPOSE_FILE} --env-file .compose.env logs --tail=50 app || true
            else
              echo "Container is running"
            fi
          else
            echo "WARNING: Container ID not found"
          fi
          echo "Deployment rollout completed"
          EOF

          PARAMS_JSON=$(python3 - <<'PY'
          import json
          with open('/tmp/rollout_commands.txt', encoding='utf-8') as f:
              commands = [line.rstrip('\n') for line in f if line.strip()]
          print(json.dumps({"commands": commands}))
          PY
          )

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$IID" \
            --document-name "AWS-RunShellScript" \
            --comment "Rollout birthday-bot commit: ${{ github.sha }}" \
            --parameters "$PARAMS_JSON" \
            --region "${{ env.AWS_REGION }}" \
            --query "Command.CommandId" \
            --output text)
          
          if [ -z "$COMMAND_ID" ] || [ "$COMMAND_ID" = "None" ]; then
            echo "❌ ERROR: Failed to send SSM command"
            exit 1
          fi
          
          echo "SSM Command ID: $COMMAND_ID"
          echo "::endgroup::"
          
          echo "::group::⏳ Waiting for command execution"
          echo "[$(date -u +'%Y-%m-%d %H:%M:%S UTC')] Waiting for SSM command to complete..."
          
          # Wait with timeout (max 5 minutes)
          TIMEOUT=300
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            RAW_STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$IID" \
              --region "${{ env.AWS_REGION }}" \
              --query 'Status' \
              --output text 2>/dev/null || echo "InProgress")
            STATUS=$(echo "$RAW_STATUS" | tr -d '\r' | xargs)
            
            if [ "$STATUS" = "Success" ]; then
              echo "✅ Command completed successfully"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "❌ Command failed with status: $STATUS"
              break
            fi
            
            sleep 5
            ELAPSED=$((ELAPSED + 5))
            echo "[$(date -u +'%Y-%m-%d %H:%M:%S UTC')] Still waiting... (${ELAPSED}s elapsed, status: $STATUS)"
          done
          
          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "⚠️ WARNING: Timeout waiting for command (${TIMEOUT}s)"
          fi
          echo "::endgroup::"
          
          echo "::group::📋 Command execution results"
          echo "[$(date -u +'%Y-%m-%d %H:%M:%S UTC')] Retrieving command output..."

          RAW_STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$IID" \
            --region "${{ env.AWS_REGION }}" \
            --query 'Status' \
            --output text 2>/dev/null || echo "Unknown")
          STATUS=$(echo "$RAW_STATUS" | tr -d '\r' | xargs)

          STDOUT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$IID" \
            --region "${{ env.AWS_REGION }}" \
            --query 'StandardOutputContent' \
            --output text 2>/dev/null || true)

          STDERR=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$IID" \
            --region "${{ env.AWS_REGION }}" \
            --query 'StandardErrorContent' \
            --output text 2>/dev/null || true)
          
          echo "Status: $STATUS"
          echo ""
          echo "=== Standard Output ==="
          echo "$STDOUT"
          echo ""
          if [ -n "$STDERR" ] && [ "$STDERR" != "None" ] && [ "$STDERR" != "Unknown" ]; then
            echo "=== Standard Error ==="
            echo "$STDERR"
            echo ""
          fi
          echo "::endgroup::"
          
          if [ "$STATUS" != "Success" ]; then
            echo "::error::Deployment failed with status: $STATUS"
            echo "::group::🔍 Full command details"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$IID" \
              --region "${{ env.AWS_REGION }}" || true
            echo "::endgroup::"
            exit 1
          fi
          
          echo "✅ Deployment rollout completed successfully!"
          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "STATUS=$STATUS" >> $GITHUB_OUTPUT

      - name: Verify container health
        id: healthcheck
        if: success()
        run: |
          set -e
          echo "::group::🏥 Verifying container health"
          echo "[$(date -u +'%Y-%m-%d %H:%M:%S UTC')] Checking container health status..."
          
          IID='${{ steps.get-instance.outputs.iid }}'
          
          # Wait a bit more for healthcheck to pass
          echo "Waiting 10 seconds for container to fully start..."
          sleep 10
          
          cat > /tmp/verify_commands.txt <<'EOF'
          set -e
          cd /opt/birthday || exit 1
          echo "=== Smart Health Verification ==="
          MAX_ATTEMPTS=18
          SLEEP_SECONDS=5
          ATTEMPT=1
          APP_OK=0
          COMPOSE_FILE=docker-compose.yml
          if [ -f docker-compose.yml ] && [ -f docker-compose.yaml ]; then
            echo "Both docker-compose.yml and docker-compose.yaml found; using docker-compose.yml"
          elif [ -f docker-compose.yaml ]; then
            COMPOSE_FILE=docker-compose.yaml
          fi

          while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
            CONTAINER_ID=$(docker compose -f ${COMPOSE_FILE} --env-file .compose.env ps -q app 2>/dev/null || echo '')
            if [ -z "$CONTAINER_ID" ]; then
              echo "Attempt ${ATTEMPT}/${MAX_ATTEMPTS}: container not found yet"
              sleep "$SLEEP_SECONDS"
              ATTEMPT=$((ATTEMPT + 1))
              continue
            fi

            CONTAINER_STATE=$(docker inspect --format='{{.State.Status}}' "$CONTAINER_ID" 2>/dev/null || echo unknown)
            HEALTH_STATE=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' "$CONTAINER_ID" 2>/dev/null || echo unknown)

            if command -v curl >/dev/null 2>&1; then
              HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/health/ready || echo 000)
            else
              wget -qO- http://localhost:8080/health/ready >/dev/null 2>&1 && HTTP_CODE=200 || HTTP_CODE=000
            fi

            echo "Attempt ${ATTEMPT}/${MAX_ATTEMPTS}: state=${CONTAINER_STATE}, health=${HEALTH_STATE}, http=${HTTP_CODE}"

            if [ "$CONTAINER_STATE" = "running" ] && [ "$HTTP_CODE" = "200" ]; then
              echo "Application is reachable and running"
              APP_OK=1
              break
            fi

            sleep "$SLEEP_SECONDS"
            ATTEMPT=$((ATTEMPT + 1))
          done

          echo
          echo "=== Final Container Status ==="
          docker compose -f ${COMPOSE_FILE} --env-file .compose.env ps app || true
          echo
          echo "=== Container Logs (last 50 lines) ==="
          docker compose -f ${COMPOSE_FILE} --env-file .compose.env logs --tail=50 app || true

          if [ "$APP_OK" -ne 1 ]; then
            echo "Application did not become ready in time"
            exit 1
          fi
          EOF

          VERIFY_PARAMS_JSON=$(python3 - <<'PY'
          import json
          with open('/tmp/verify_commands.txt', encoding='utf-8') as f:
              commands = [line.rstrip('\n') for line in f if line.strip()]
          print(json.dumps({"commands": commands}))
          PY
          )

          VERIFY_CMD_ID=$(aws ssm send-command \
            --instance-ids "$IID" \
            --document-name "AWS-RunShellScript" \
            --comment "Verify birthday-bot container health" \
            --parameters "$VERIFY_PARAMS_JSON" \
            --region "${{ env.AWS_REGION }}" \
            --query "Command.CommandId" \
            --output text)
          
          echo "Verification command ID: $VERIFY_CMD_ID"
          sleep 5
          
          VERIFY_STATUS=$(aws ssm get-command-invocation \
            --command-id "$VERIFY_CMD_ID" \
            --instance-id "$IID" \
            --region "${{ env.AWS_REGION }}" \
            --query 'Status' \
            --output text 2>/dev/null || echo "Unknown")
          VERIFY_STATUS=$(echo "$VERIFY_STATUS" | tr -d '\r' | xargs)

          VERIFY_STDOUT=$(aws ssm get-command-invocation \
            --command-id "$VERIFY_CMD_ID" \
            --instance-id "$IID" \
            --region "${{ env.AWS_REGION }}" \
            --query 'StandardOutputContent' \
            --output text 2>/dev/null || true)
          
          echo "Verification status: $VERIFY_STATUS"
          echo ""
          echo "$VERIFY_STDOUT"
          echo "::endgroup::"
          
          if [ "$VERIFY_STATUS" != "Success" ]; then
            echo "::error::Health check verification failed with status: $VERIFY_STATUS"
            exit 1
          fi
